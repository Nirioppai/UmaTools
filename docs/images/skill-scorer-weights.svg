<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="system-ui, -apple-system, sans-serif">
  <rect width="700" height="360" fill="white"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">Automated Skill Scoring — 5 Weighted Dimensions</text>

  <!-- Horizontal bar chart -->
  <g transform="translate(30, 50)">
    <!-- Effect Impact: 35% -->
    <text x="130" y="14" text-anchor="end" font-size="11" font-weight="600" fill="#1f2937">Effect Impact</text>
    <rect x="140" y="0" width="350" height="24" rx="4" fill="#f3f4f6" stroke="#374151" stroke-width="0.5"/>
    <rect x="140" y="0" width="245" height="24" rx="4" fill="#ef4444" stroke="#7f1d1d" stroke-width="0.5"/>
    <text x="255" y="16" font-size="11" font-weight="bold" fill="white" stroke="#7f1d1d" stroke-width="2.5" paint-order="stroke">35%</text>

    <!-- Consistency: 20% -->
    <text x="130" y="54" text-anchor="end" font-size="11" font-weight="600" fill="#1f2937">Consistency</text>
    <rect x="140" y="40" width="350" height="24" rx="4" fill="#f3f4f6" stroke="#374151" stroke-width="0.5"/>
    <rect x="140" y="40" width="140" height="24" rx="4" fill="#3b82f6" stroke="#1e3a5f" stroke-width="0.5"/>
    <text x="200" y="56" font-size="11" font-weight="bold" fill="white" stroke="#1e3a5f" stroke-width="2.5" paint-order="stroke">20%</text>

    <!-- Cost Efficiency: 20% -->
    <text x="130" y="94" text-anchor="end" font-size="11" font-weight="600" fill="#1f2937">Cost Efficiency</text>
    <rect x="140" y="80" width="350" height="24" rx="4" fill="#f3f4f6" stroke="#374151" stroke-width="0.5"/>
    <rect x="140" y="80" width="140" height="24" rx="4" fill="#22c55e" stroke="#14532d" stroke-width="0.5"/>
    <text x="200" y="96" font-size="11" font-weight="bold" fill="white" stroke="#14532d" stroke-width="2.5" paint-order="stroke">20%</text>

    <!-- Applicability: 15% -->
    <text x="130" y="134" text-anchor="end" font-size="11" font-weight="600" fill="#1f2937">Applicability</text>
    <rect x="140" y="120" width="350" height="24" rx="4" fill="#f3f4f6" stroke="#374151" stroke-width="0.5"/>
    <rect x="140" y="120" width="105" height="24" rx="4" fill="#f59e0b" stroke="#78350f" stroke-width="0.5"/>
    <text x="183" y="136" font-size="11" font-weight="bold" fill="white" stroke="#78350f" stroke-width="2.5" paint-order="stroke">15%</text>

    <!-- Duration: 10% -->
    <text x="130" y="174" text-anchor="end" font-size="11" font-weight="600" fill="#1f2937">Duration</text>
    <rect x="140" y="160" width="350" height="24" rx="4" fill="#f3f4f6" stroke="#374151" stroke-width="0.5"/>
    <rect x="140" y="160" width="70" height="24" rx="4" fill="#8b5cf6" stroke="#4c1d95" stroke-width="0.5"/>
    <text x="168" y="176" font-size="11" font-weight="bold" fill="white" stroke="#4c1d95" stroke-width="2.5" paint-order="stroke">10%</text>
  </g>

  <!-- Effect type reference -->
  <g transform="translate(30, 260)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#1f2937">Effect Type Weights (for Effect Impact dimension):</text>

    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="640" height="70" rx="6" fill="#fef2f2" stroke="#374151" stroke-width="1"/>

      <!-- Row 1 -->
      <g font-size="9" fill="#1f2937">
        <text x="12" y="18"><tspan font-weight="bold" fill="#dc2626">1.4×</tspan> Acceleration</text>
        <text x="145" y="18"><tspan font-weight="bold" fill="#dc2626">1.2×</tspan> Target Speed</text>
        <text x="295" y="18"><tspan font-weight="bold" fill="#d97706">1.0×</tspan> Speed Boost</text>
        <text x="440" y="18"><tspan font-weight="bold" fill="#d97706">0.9×</tspan> Velocity</text>
      </g>

      <!-- Row 2 -->
      <g font-size="9" fill="#1f2937">
        <text x="12" y="38"><tspan font-weight="bold" fill="#16a34a">0.85×</tspan> Raw Speed</text>
        <text x="145" y="38"><tspan font-weight="bold" fill="#16a34a">0.80×</tspan> Stamina Rec.</text>
        <text x="295" y="38"><tspan font-weight="bold" fill="#374151">0.55×</tspan> HP Recovery</text>
        <text x="440" y="38"><tspan font-weight="bold" fill="#374151">0.50×</tspan> Stat Boost</text>
      </g>

      <!-- Row 3 -->
      <g font-size="9" fill="#1f2937">
        <text x="12" y="58"><tspan font-weight="bold" fill="#6b7280">0.35×</tspan> Debuff</text>
        <text x="145" y="58"><tspan font-weight="bold" fill="#6b7280">0.15×</tspan> Misc/Other</text>
        <text x="440" y="58" font-style="italic" fill="#374151">Higher = more impactful</text>
      </g>
    </g>
  </g>
</svg>