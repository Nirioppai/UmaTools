<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="statGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="uniqGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="skillGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="totalGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
  </defs>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">Rating Composition</text>

  <!-- Formula row -->
  <g transform="translate(0, 50)">
    <!-- Stat Score box -->
    <rect x="30" y="0" width="155" height="68" rx="10" fill="url(#statGrad)" opacity="0.9"/>
    <text x="107" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Stat Score</text>
    <text x="107" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">5 stats × boundary table</text>

    <!-- Plus -->
    <text x="205" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b7280">+</text>

    <!-- Unique Bonus box -->
    <rect x="225" y="0" width="155" height="68" rx="10" fill="url(#uniqGrad)" opacity="0.9"/>
    <text x="302" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Unique Bonus</text>
    <text x="302" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">level × star multiplier</text>

    <!-- Plus -->
    <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b7280">+</text>

    <!-- Skill Score box -->
    <rect x="420" y="0" width="155" height="68" rx="10" fill="url(#skillGrad)" opacity="0.9"/>
    <text x="497" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Skill Score</text>
    <text x="497" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">sum of skill scores</text>

    <!-- Equals -->
    <text x="595" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#6b7280">=</text>

    <!-- Total Rating box -->
    <rect x="613" y="0" width="70" height="68" rx="10" fill="url(#totalGrad)" opacity="0.9"/>
    <text x="648" y="32" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Total</text>
    <text x="648" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Rating</text>
  </g>

  <!-- Example breakdown bar -->
  <text x="30" y="155" font-size="11" font-weight="600" fill="#374151">Example breakdown (5 stats at 1500, 3★ unique Lv5, 6000 skill score):</text>

  <g transform="translate(30, 165)">
    <!-- Scale: total = 34650 + 850 + 6000 = 41500; bar width = 640 -->
    <!-- Stats: 34650/41500 * 640 = 534 -->
    <rect x="0" y="0" width="534" height="32" rx="6" fill="url(#statGrad)" opacity="0.85"/>
    <text x="267" y="21" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Stat Score: 34,650 (83.5%)</text>

    <!-- Unique: 850/41500 * 640 = 13 -->
    <rect x="534" y="0" width="13" height="32" fill="url(#uniqGrad)" opacity="0.85"/>

    <!-- Skill: 6000/41500 * 640 = 93 -->
    <rect x="547" y="0" width="93" height="32" rx="0 6 6 0" fill="url(#skillGrad)" opacity="0.85"/>
    <text x="593" y="21" text-anchor="middle" font-size="9" font-weight="bold" fill="white">6,000</text>

    <!-- Total label -->
    <text x="648" y="21" font-size="11" font-weight="bold" fill="#10b981">= 41,500</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 220)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6"/><text x="18" y="10" font-size="10" fill="#374151">Stat Score</text>
    <rect x="110" y="0" width="12" height="12" rx="2" fill="#8b5cf6"/><text x="128" y="10" font-size="10" fill="#374151">Unique Bonus</text>
    <rect x="240" y="0" width="12" height="12" rx="2" fill="#f59e0b"/><text x="258" y="10" font-size="10" fill="#374151">Skill Score</text>
    <rect x="360" y="0" width="12" height="12" rx="2" fill="#10b981"/><text x="378" y="10" font-size="10" fill="#374151">Total Rating</text>
  </g>
</svg>