<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="system-ui, -apple-system, sans-serif">
  <rect width="700" height="260" fill="white"/>

  <defs>
    <clipPath id="barClip">
      <rect x="0" y="0" width="550" height="32" rx="6"/>
    </clipPath>
  </defs>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">Rating Composition</text>

  <!-- Formula row -->
  <g transform="translate(0, 50)">
    <!-- Stat Score box -->
    <rect x="30" y="0" width="155" height="68" rx="10" fill="#3b82f6" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="107" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="white" stroke="#1e3a5f" stroke-width="3" paint-order="stroke">Stat Score</text>
    <text x="107" y="48" text-anchor="middle" font-size="10" fill="white" stroke="#1e3a5f" stroke-width="2.5" paint-order="stroke">5 stats × boundary table</text>

    <!-- Plus -->
    <text x="205" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2937">+</text>

    <!-- Unique Bonus box -->
    <rect x="225" y="0" width="155" height="68" rx="10" fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5"/>
    <text x="302" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="white" stroke="#4c1d95" stroke-width="3" paint-order="stroke">Unique Bonus</text>
    <text x="302" y="48" text-anchor="middle" font-size="10" fill="white" stroke="#4c1d95" stroke-width="2.5" paint-order="stroke">level × star multiplier</text>

    <!-- Plus -->
    <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2937">+</text>

    <!-- Skill Score box -->
    <rect x="420" y="0" width="155" height="68" rx="10" fill="#d97706" stroke="#78350f" stroke-width="1.5"/>
    <text x="497" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="white" stroke="#78350f" stroke-width="3" paint-order="stroke">Skill Score</text>
    <text x="497" y="48" text-anchor="middle" font-size="10" fill="white" stroke="#78350f" stroke-width="2.5" paint-order="stroke">sum of skill scores</text>

    <!-- Equals -->
    <text x="595" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2937">=</text>

    <!-- Total Rating box -->
    <rect x="613" y="0" width="70" height="68" rx="10" fill="#059669" stroke="#064e3b" stroke-width="1.5"/>
    <text x="648" y="32" text-anchor="middle" font-size="11" font-weight="bold" fill="white" stroke="#064e3b" stroke-width="2.5" paint-order="stroke">Total</text>
    <text x="648" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="white" stroke="#064e3b" stroke-width="2.5" paint-order="stroke">Rating</text>
  </g>

  <!-- Example breakdown bar -->
  <text x="30" y="155" font-size="11" font-weight="600" fill="#1f2937">Example breakdown (5 stats at 1500, 3★ unique Lv5, 6000 skill score):</text>

  <g transform="translate(30, 165)">
    <!-- Segments clipped to rounded shape (550px wide) -->
    <!-- Stats: 34650/41500 * 550 = 459, Unique: 850/41500 * 550 = 11, Skill: 6000/41500 * 550 = 80 -->
    <g clip-path="url(#barClip)">
      <rect x="0" y="0" width="459" height="32" fill="#3b82f6"/>
      <rect x="459" y="0" width="11" height="32" fill="#7c3aed"/>
      <rect x="470" y="0" width="80" height="32" fill="#d97706"/>
    </g>

    <!-- Outer border (rounded) -->
    <rect x="0" y="0" width="550" height="32" rx="6" fill="none" stroke="#374151" stroke-width="1.5"/>

    <!-- Labels on bar -->
    <text x="230" y="21" text-anchor="middle" font-size="10" font-weight="bold" fill="white" stroke="#1e3a5f" stroke-width="2.5" paint-order="stroke">Stat Score: 34,650 (83.5%)</text>
    <text x="510" y="21" text-anchor="middle" font-size="9" font-weight="bold" fill="white" stroke="#78350f" stroke-width="2" paint-order="stroke">6,000</text>

    <!-- Total label (outside bar, within viewBox) -->
    <text x="560" y="21" font-size="11" font-weight="bold" fill="#059669">= 41,500</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 220)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6" stroke="#1f2937" stroke-width="0.5"/><text x="18" y="10" font-size="10" fill="#1f2937">Stat Score</text>
    <rect x="110" y="0" width="12" height="12" rx="2" fill="#7c3aed" stroke="#1f2937" stroke-width="0.5"/><text x="128" y="10" font-size="10" fill="#1f2937">Unique Bonus</text>
    <rect x="240" y="0" width="12" height="12" rx="2" fill="#d97706" stroke="#1f2937" stroke-width="0.5"/><text x="258" y="10" font-size="10" fill="#1f2937">Skill Score</text>
    <rect x="360" y="0" width="12" height="12" rx="2" fill="#059669" stroke="#1f2937" stroke-width="0.5"/><text x="378" y="10" font-size="10" fill="#1f2937">Total Rating</text>
  </g>
</svg>