<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="415" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">Stat Score per Stat Value (Single Stat, 0–2500)</text>

  <!-- Background -->
  <rect x="80" y="30" width="670" height="330" fill="#f9fafb" rx="4"/>

  <!-- Horizontal grid lines + Y-axis labels -->
  <g stroke="#e5e7eb" stroke-width="0.5" fill="#6b7280" font-size="10" text-anchor="end">
    <line x1="80" y1="360" x2="750" y2="360"/><text x="75" y="363">0</text>
    <line x1="80" y1="327" x2="750" y2="327"/><text x="75" y="330">5k</text>
    <line x1="80" y1="294" x2="750" y2="294"/><text x="75" y="297">10k</text>
    <line x1="80" y1="261" x2="750" y2="261"/><text x="75" y="264">15k</text>
    <line x1="80" y1="228" x2="750" y2="228"/><text x="75" y="231">20k</text>
    <line x1="80" y1="195" x2="750" y2="195"/><text x="75" y="198">25k</text>
  </g>

  <!-- Vertical grid lines + X-axis labels -->
  <g stroke="#e5e7eb" stroke-width="0.5" fill="#6b7280" font-size="10" text-anchor="middle">
    <line x1="80" y1="30" x2="80" y2="360"/>  <text x="80" y="378">0</text>
    <line x1="214" y1="30" x2="214" y2="360"/><text x="214" y="378">500</text>
    <line x1="348" y1="30" x2="348" y2="360"/><text x="348" y="378">1000</text>
    <line x1="482" y1="30" x2="482" y2="360"/><text x="482" y="378">1500</text>
    <line x1="616" y1="30" x2="616" y2="360"/><text x="616" y="378">2000</text>
    <line x1="750" y1="30" x2="750" y2="360"/><text x="750" y="378">2500</text>
  </g>

  <!-- Axis labels -->
  <text x="415" y="400" text-anchor="middle" font-size="11" fill="#374151">Stat Value</text>
  <text x="20" y="195" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90,20,195)">Score</text>

  <!-- Filled area under curve -->
  <polygon points="80,360 106.8,359.1 133.6,357.6 160.4,355.4 187.2,352.4 214,348.8 240.8,344.8 267.6,340.6 294.4,336 321.2,330.7 348,325.1 374.8,317.9 401.6,309 428.4,297.2 455.2,282.5 482,267.9 508.8,252.3 535.6,234.8 562.4,210.4 589.2,184.6 616,158.8 642.8,133 669.6,107.2 696.4,81.4 723.2,55.6 750,30 750,360" fill="url(#curveGrad)"/>

  <!-- Main curve line -->
  <polyline points="80,360 106.8,359.1 133.6,357.6 160.4,355.4 187.2,352.4 214,348.8 240.8,344.8 267.6,340.6 294.4,336 321.2,330.7 348,325.1 374.8,317.9 401.6,309 428.4,297.2 455.2,282.5 482,267.9 508.8,252.3 535.6,234.8 562.4,210.4 589.2,184.6 616,158.8 642.8,133 669.6,107.2 696.4,81.4 723.2,55.6 750,30" fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Key data point markers -->
  <g fill="#3b82f6">
    <circle cx="80" cy="360" r="3.5"/>
    <circle cx="348" cy="325.1" r="3.5"/>
    <circle cx="482" cy="267.9" r="3.5"/>
    <circle cx="616" cy="158.8" r="3.5"/>
    <circle cx="750" cy="30" r="3.5"/>
  </g>

  <!-- Data point labels -->
  <g font-size="9" fill="#1f2937" font-weight="600">
    <text x="348" y="318">2,630</text>
    <text x="482" y="261">6,930</text>
    <text x="616" y="152">15,140</text>
    <text x="750" y="48" text-anchor="end">24,840</text>
  </g>

  <!-- Annotation: inflection zone -->
  <line x1="401" y1="33" x2="401" y2="360" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="405" y="44" font-size="8.5" fill="#ef4444" font-style="italic">stat 1200 — growth accelerates</text>

  <!-- Legend box -->
  <rect x="585" y="394" width="170" height="22" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="593" y="409" font-size="9" fill="#6b7280">Per-point rate: 0.5 → 19.4</text>

  <!-- Border -->
  <rect x="80" y="30" width="670" height="330" fill="none" stroke="#d1d5db" stroke-width="1" rx="4"/>
</svg>