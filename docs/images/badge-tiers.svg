<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tierBase" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#9ca3af"/><stop offset="100%" stop-color="#6b7280"/></linearGradient>
    <linearGradient id="tierU" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="tierL" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">Rating Badge Progression (298 Tiers)</text>

  <!-- Base ranks: G to SS+ (0 - 19,200) -->
  <g transform="translate(30, 50)">
    <text x="0" y="-6" font-size="10" font-weight="600" fill="#6b7280">BASE RANKS</text>
    <rect x="0" y="0" width="740" height="28" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>

    <!-- G -->
    <rect x="1" y="1" width="11" height="26" rx="5" fill="#9ca3af"/>
    <text x="6" y="18" text-anchor="middle" font-size="7" fill="white" font-weight="bold">G</text>

    <!-- F -->
    <rect x="24" y="1" width="13" height="26" fill="#9ca3af"/>
    <text x="30" y="18" text-anchor="middle" font-size="7" fill="white" font-weight="bold">F</text>

    <!-- E -->
    <rect x="50" y="1" width="21" height="26" fill="#78716c"/>
    <text x="60" y="18" text-anchor="middle" font-size="7" fill="white" font-weight="bold">E</text>

    <!-- D -->
    <rect x="83" y="1" width="24" height="26" fill="#a16207"/>
    <text x="95" y="18" text-anchor="middle" font-size="7" fill="white" font-weight="bold">D</text>

    <!-- C -->
    <rect x="119" y="1" width="55" height="26" fill="#ca8a04"/>
    <text x="146" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">C</text>

    <!-- B -->
    <rect x="186" y="1" width="70" height="26" fill="#65a30d"/>
    <text x="221" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">B</text>

    <!-- A -->
    <rect x="268" y="1" width="94" height="26" fill="#0891b2"/>
    <text x="315" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">A</text>

    <!-- S -->
    <rect x="374" y="1" width="63" height="26" fill="#7c3aed"/>
    <text x="405" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">S</text>

    <!-- SS -->
    <rect x="449" y="1" width="66" height="26" fill="#db2777"/>
    <text x="482" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">SS</text>

    <!-- Thresholds -->
    <text x="1" y="44" font-size="8" fill="#9ca3af">0</text>
    <text x="186" y="44" font-size="8" fill="#9ca3af">6.5k</text>
    <text x="374" y="44" font-size="8" fill="#9ca3af">14.5k</text>
    <text x="505" y="44" font-size="8" fill="#9ca3af" text-anchor="end">19.2k</text>
  </g>

  <!-- Ultimate ranks: UG to US9 (19,600 - 74,400) -->
  <g transform="translate(30, 120)">
    <text x="0" y="-6" font-size="10" font-weight="600" fill="#3b82f6">ULTIMATE RANKS (U)</text>
    <rect x="0" y="0" width="740" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>

    <!-- UG block -->
    <rect x="1" y="1" width="58" height="26" rx="5" fill="#60a5fa"/>
    <text x="30" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">UG–UG9</text>

    <!-- UF block -->
    <rect x="62" y="1" width="62" height="26" fill="#818cf8"/>
    <text x="93" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">UF–UF9</text>

    <!-- UE block -->
    <rect x="127" y="1" width="78" height="26" fill="#a78bfa"/>
    <text x="166" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">UE–UE9</text>

    <!-- UD block -->
    <rect x="208" y="1" width="81" height="26" fill="#c084fc"/>
    <text x="248" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">UD–UD9</text>

    <!-- UC block -->
    <rect x="292" y="1" width="90" height="26" fill="#e879f9"/>
    <text x="337" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">UC–UC9</text>

    <!-- UB block -->
    <rect x="385" y="1" width="98" height="26" fill="#f472b6"/>
    <text x="434" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">UB–UB9</text>

    <!-- UA block -->
    <rect x="486" y="1" width="106" height="26" fill="#fb923c"/>
    <text x="539" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">UA–UA9</text>

    <!-- US block -->
    <rect x="595" y="1" width="144" height="26" rx="0 5 5 0" fill="#f87171"/>
    <text x="667" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">US–US9</text>

    <!-- Thresholds -->
    <text x="1" y="44" font-size="8" fill="#93c5fd">19.6k</text>
    <text x="208" y="44" font-size="8" fill="#93c5fd">34.4k</text>
    <text x="486" y="44" font-size="8" fill="#93c5fd">55.2k</text>
    <text x="729" y="44" font-size="8" fill="#93c5fd" text-anchor="end">74.4k</text>
  </g>

  <!-- League ranks: LG to LS24 (76,000 - 190,400) -->
  <g transform="translate(30, 190)">
    <text x="0" y="-6" font-size="10" font-weight="600" fill="#f59e0b">LEAGUE RANKS (L) — NEW</text>
    <rect x="0" y="0" width="740" height="28" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>

    <!-- LG block -->
    <rect x="1" y="1" width="93" height="26" rx="5" fill="#fbbf24"/>
    <text x="47" y="18" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">LG–LG24</text>

    <!-- LF block -->
    <rect x="97" y="1" width="93" height="26" fill="#f59e0b"/>
    <text x="143" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">LF–LF24</text>

    <!-- LE block -->
    <rect x="193" y="1" width="93" height="26" fill="#f97316"/>
    <text x="239" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">LE–LE24</text>

    <!-- LD block -->
    <rect x="289" y="1" width="93" height="26" fill="#fb923c"/>
    <text x="335" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">LD–LD24</text>

    <!-- LC block -->
    <rect x="385" y="1" width="93" height="26" fill="#ef4444"/>
    <text x="431" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">LC–LC24</text>

    <!-- LB block -->
    <rect x="481" y="1" width="93" height="26" fill="#dc2626"/>
    <text x="527" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">LB–LB24</text>

    <!-- LA block -->
    <rect x="577" y="1" width="80" height="26" fill="#b91c1c"/>
    <text x="617" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">LA–LA24</text>

    <!-- LS block -->
    <rect x="660" y="1" width="79" height="26" rx="0 5 5 0" fill="#991b1b"/>
    <text x="699" y="18" text-anchor="middle" font-size="8" fill="white" font-weight="bold">LS–LS24</text>

    <!-- Thresholds -->
    <text x="1" y="44" font-size="8" fill="#d97706">76k</text>
    <text x="289" y="44" font-size="8" fill="#d97706">118.8k</text>
    <text x="577" y="44" font-size="8" fill="#d97706">161.1k</text>
    <text x="729" y="44" font-size="8" fill="#d97706" text-anchor="end">190.4k</text>
  </g>

  <!-- Summary stats -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="740" height="38" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="20" y="24" font-size="10" fill="#374151">
      <tspan font-weight="bold">18</tspan> base ranks (G → SS+)
      <tspan dx="20" font-weight="bold">80</tspan> ultimate ranks (UG → US9)
      <tspan dx="20" font-weight="bold">200</tspan> league ranks (LG → LS24)
      <tspan dx="20">= </tspan><tspan font-weight="bold" fill="#10b981">298 total tiers</tspan>
    </text>
  </g>
</svg>