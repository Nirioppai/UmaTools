<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UmaTools - Event OCR Helper</title>
    <meta
      name="description"
      content="Use UmaTools Event OCR to capture event screens and search outcomes instantly."
    />
    <meta property="og:title" content="UmaTools - Event OCR Helper" />
    <meta
      property="og:description"
      content="Use UmaTools Event OCR to capture event screens and search outcomes instantly."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UmaTools" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/theme-d.build.css" />
    <link rel="stylesheet" href="/css/events.css" />
    <script defer src="/_vercel/insights/script.js"></script>
      <meta name="color-scheme" content="light dark" />
  </head>
  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("umasearch-darkmode");
          var dark = pref
            ? pref === "dark"
            : window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          var root = document.documentElement;
          root.classList.add("is-loading");
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove("is-loading");
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                })
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener("load", function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener("nav:ready", function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>
    
    <div class="container">
      <h1>Uma Event Helper</h1>

      <button
        id="modeToggleBtn"
        aria-label="Toggle dark/light mode"
        class="mode-toggle-btn"
        title="Toggle dark/light mode"
      >
        <svg
          id="iconSun"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="feather feather-sun"
        >
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg
          id="iconMoon"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="feather feather-moon"
          style="display: none"
        >
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
        </svg>
      </button>

      <section class="search-panel">
        <form id="search-form" class="search-form">
          <input
            id="query"
            type="text"
            placeholder="Search an event name..."
            autocomplete="off"
          />
          <button id="search-btn" type="submit">Search</button>
        </form>
        <div id="status" class="status"></div>
      </section>

      <div class="ocr-controls">
        <button id="captureBtn" class="capture-btn">
          Capture Screen for OCR
        </button>
        <label class="scan-time-label" for="searchDelayButtons"
          >Scan Time:</label>
        <div
          id="searchDelayButtons"
          class="delay-buttons"
          role="group"
          aria-label="Select OCR scan time"
        >
          <button data-delay="3000" class="delay-btn active" type="button">
            3s
          </button>
          <button data-delay="5000" class="delay-btn" type="button">5s</button>
          <button data-delay="10000" class="delay-btn" type="button">
            10s
          </button>
        </div>
      </div>

      <div id="suggestions" class="ocr-suggestions"></div>
      <video id="captureVideo" autoplay muted></video>
      <div id="result" class="result"></div>
    </div>
    <script src="/js/ocr.js" defer data-cfasync="false"></script>
    <script type="module" src="/js/search.js"></script>
    <script type="module" src="/js/recommend.js"></script>
        <script>

  { label: "Optimizer", path: "/optimizer", file: "/optimizer.html" },
  { label: "Calculator", path: "/calculator", file: "/calculator.html" },
  { label: "Stamina Check", path: "/stamina", file: "/stamina.html" },
  { label: "Event OCR", path: "/events", file: "/events.html" },
  { label: "Support Hints", path: "/hints", file: "/hints.html" },
  { label: "Randomizer", path: "/random", file: "/random.html" },
  { label: "Umadle", path: "/umadle", file: "/umadle.html" }
];
    </script>

    <script src="/js/nav.js" defer></script>
    <script src="/js/theme-toggle.js" defer></script>
  </body>
</html>
