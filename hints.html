    <script>
      (function () {
        try {
          var pref = localStorage.getItem("umasearch-darkmode");
          var dark = pref
            ? pref === "dark"
            : window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          var root = document.documentElement;
          root.classList.add("is-loading");
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove("is-loading");
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                })
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener("load", function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener("nav:ready", function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>
    
    <main id="main" class="container">
      <h1>Support Hint Finder</h1>

      </button>

      <p class="subtle">
        Type a skill hint (e.g., <em>Medium Corners</em>), press Enter to add
        it.
      </p>

      <div class="toolbar">
        <div class="controls" id="guess-form" style="flex: 1">
          <input
            id="hintInput"
            list="hintList"
            type="text"
            placeholder="Add hint (e.g., Medium Corners &#9675;)"
          />
          <button id="addBtn" class="primary">Add</button>
          <select id="modeSelect" aria-label="Match mode">

            <option value="OR">Match ANY (OR)</option>
          </select>
        </div>

        <div class="row">
          <label><input type="checkbox" id="fSSR" checked /> SSR</label>
          <label><input type="checkbox" id="fSR" checked /> SR</label>
          <label><input type="checkbox" id="fR" checked /> R</label>
        </div>

        <div class="row">
          <button id="clearBtn">Clear</button>
        </div>
      </div>

      <datalist id="hintList"></datalist>

      <div class="chips" id="chips"></div>
      <div class="inline-note muted" id="counts"></div>
      <div class="spacer"></div>

      <div id="results" class="grid"></div>
