<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UmaTools - Uma Musume Randomizer</title>
    <meta
      name="description"
      content="Randomize Uma Musume support decks and pick a random Uma for training challenges."
    />
    <meta
      property="og:title"
      content="UmaTools - Uma Musume Randomizer"
    />
    <meta
      property="og:description"
      content="Randomize Uma Musume support decks and pick a random Uma for training challenges."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UmaTools" />
    <meta name="twitter:card" content="summary" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/theme-d.build.css" />
    <link rel="stylesheet" href="/css/random.css" />
    <meta name="color-scheme" content="light dark" />
    <!-- No-flash dark mode: pre-apply saved theme before paint -->
    
      <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("umasearch-darkmode");
          var dark = pref
            ? pref === "dark"
            : window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          var root = document.documentElement;
          root.classList.add("is-loading");
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove("is-loading");
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                })
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener("load", function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener("nav:ready", function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>
    <button
      id="modeToggleBtn"
      aria-label="Toggle dark/light mode"
      class="mode-toggle-btn"
      title="Toggle dark/light mode"
    >
      <svg
        id="iconSun"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="feather feather-sun"
      >
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg
        id="iconMoon"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="feather feather-moon"
        style="display: none"
      >
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
      </svg>
    </button>

    <main class="container">
      <h1>Randomizer</h1>

      <!-- Support Deck Randomizer -->
      <section id="supportRandomizer" class="result">
        <div class="choice">
          <h3>Support Deck (5 cards)</h3>
          <div class="toolbar" role="group" aria-label="Support filters">
            <label><input type="checkbox" id="fSSR" checked /> SSR</label>
            <label><input type="checkbox" id="fSR" checked /> SR</label>
            <label><input type="checkbox" id="fR" checked /> R</label>

            <div style="flex: 1 1 220px"></div>

            <label class="toggle" style="margin-right:.75rem"><input type="checkbox" id="speed2x"> 2&times; speed</label>
<button class="btn primary" id="rollBtn" type="button">
              Roll 5
            </button>
            <button class="btn" id="clearExBtn" type="button">
              Clear Exclusions
            </button>
          </div>

          <div class="toolbar" role="group" aria-label="Exclude cards">
            <input
              list="supportList"
              id="excludeInput"
              placeholder="Exclude a support (choose from list)"
            />
            <datalist id="supportList"></datalist>
            <button class="btn" id="addExBtn" type="button">
              Add to Exclusions
            </button>
          </div>

          <div id="excludeChips" class="chips" aria-live="polite"></div>
        </div>

        <div id="deckResults" class="grid" aria-live="polite"></div>
      </section>

      <div class="spacer"></div>

      <!-- Uma Randomizer -->
      <section id="umaRandomizer" class="result">
        <div class="choice">
          <h3>Random Uma</h3>
          <div class="toolbar">
            <label class="toggle" style="margin-right:.75rem"><input type="checkbox" id="speed2xUma"> 2&times; speed</label>
<button class="btn primary" id="pickUmaBtn" type="button">
              Pick Random Uma
            </button>
          </div>
        </div>

        <div id="umaResult" class="grid" aria-live="polite"></div>
      </section>
    </main>

    
    <script src="/js/random.js" defer></script>
        <script>
      window.NAV_ROUTES = [
  { label: "Optimizer", path: "/optimizer", file: "/optimizer.html" },
  { label: "Calculator", path: "/calculator", file: "/calculator.html" },
  { label: "Stamina Check", path: "/stamina", file: "/stamina.html" },
  { label: "Event OCR", path: "/events", file: "/events.html" },
  { label: "Support Hints", path: "/hints", file: "/hints.html" },
  { label: "Randomizer", path: "/random", file: "/random.html" },
  { label: "Umadle", path: "/umadle", file: "/umadle.html" }
];
    </script>

    <script src="/js/nav.js" defer></script>
    <script src="/js/theme-toggle.js" defer></script>
  </body>
</html>
